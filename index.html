<!doctype html>
<html lang="en" class="h-full w-full m-0">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Main page</title>
  </head>
  <body class="h-full w-full m-0">
    <div class="flex items-center justify-center h-full w-full">
      <div class="relative flex items-center justify-center">
        <span
          id="centerText"
          class="text-xl font-[fantasy] font-semibold transition-all duration-300 absolute transition"
        >
        </span>
        <div
          class="absolute w-64 h-64 rounded-full border-2 border-dashed border-gray-800 animate-[spin_60s_linear_infinite_reverse]"
        ></div>
        <div
          class="absolute w-60 h-60 rounded-full border-2 border-dashed border-gray-800 animate-[spin_90s_linear_infinite]"
        ></div>

        <div
          class="relative w-64 h-64 text-xl font-bold font-[fantasy] animate-[spin_80s_linear_infinite] hover:[animation-play-state:paused]"
        >
          <!-- Link 1 -->
          <a
            href="/tetris/index.html"
            data-name="Tetris"
            class="absolute left-1/2 -top-[8%] -translate-x-1/2 rotate-[0deg] nav-link"
          >
            Tetris
          </a>

          <a
            href="/snake/index.html"
            data-name="Snake"
            class="absolute top-[13%] left-[12%] -translate-y-1/2 -translate-x-1/2 rotate-[-45deg] nav-link"
            >Snake
          </a>

          <a
            href="/tetris/index.html"
            data-name="Tetris"
            class="absolute left-[93%] top-1/2 -translate-y-1/2 rotate-[90deg] nav-link"
          >
            Tetris
          </a>

          <a
            href="/snake/index.html"
            data-name="Snake"
            class="absolute top-[13%] left-[88%] -translate-y-1/2 -translate-x-1/2 rotate-[45deg] nav-link"
            >Snake
          </a>

          <!-- Link 3 -->
          <a
            href="/tetris/index.html"
            data-name="Tetris"
            class="absolute left-1/2 -bottom-[8%] -translate-x-1/2 rotate-[180deg] nav-link"
          >
            Tetris
          </a>

          <a
            href="/snake/index.html"
            data-name="Snake"
            class="absolute top-[85%] left-[90%] -translate-y-1/2 -translate-x-1/2 rotate-[-225deg] nav-link"
            >Snake
          </a>

          <!-- Link 4 -->
          <a
            href="/tetris/index.html"
            data-name="Tetris"
            class="absolute -left-[3%] top-1/2 -translate-y-1/2 -translate-x-1/2 rotate-[270deg] nav-link"
          >
            Tetris
          </a>

          <a
            href="/snake/index.html"
            data-name="Snake"
            class="absolute top-[85%] left-[10%] -translate-y-1/2 -translate-x-1/2 rotate-[225deg] nav-link"
            >Snake</a
          >
        </div>
      </div>
    </div>
  </body>
  <script>
    const centerText = document.getElementById("centerText");
    const links = document.querySelectorAll(".nav-link");

    links.forEach((link) => {
      link.addEventListener("mouseenter", () => {
        centerText.textContent = link.dataset.name;
        centerText.classList.remove("scale-0");
        centerText.classList.add("scale-125");
      });

      link.addEventListener("mouseleave", () => {
        centerText.classList.remove("scale-125");
        centerText.classList.add("scale-0");
      });
    });
  </script>
</html>
