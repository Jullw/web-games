<!doctype html>
<html lang="fi" class="h-full w-full m-0">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Convay's Game of Life</title>
  </head>

  <body
    class="h-full m-0 bg-gradient-to-b from-yellow-200 via-yellow-100 to-orange-400"
  >
    <div class="flex flex-col justify-center items-center h-full">
      <div class="gap-2 flex flex-col" id="canvasWrap">
        <div class="flex flex-row gap-6">
          <div class="flex flex-col">
            <label for="interval"> Interval (ms)</label>
            <input
              id="interval"
              class="bg-inherit border border-black outline-none focus:border-dashed"
              type="number"
              value="100"
              min="0"
              max="1000"
              step="1"
            />
          </div>
          <div class="flex flex-col">
            <label for="randoms"> Randoms</label>
            <input
              id="randoms"
              class="bg-inherit border border-black outline-none focus:border-dashed"
              type="number"
              value="300"
              min="0"
              max="1000"
              step="1"
            />
          </div>

          <div class="flex items-end gap-2">
            <button
              id="play"
              value="stop"
              class="border border-black h-fit p-1 active:border-dashed"
            >
              Stop
            </button>
          </div>

          <div class="flex items-end gap-2">
            <button
              id="startBtn"
              class="border border-black h-fit p-1 active:border-dashed"
            >
              Draw
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const COLS = 50;
      const ROWS = 50;
      const CELL = 10;

      let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
      let tempBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
      let simulationOver = false;
      let generationCount = 1;
      let randomAlives = 300;

      // time settings
      let deltaSum = 0;
      let interval = 100;
      let play = true;

      document.getElementById("play").addEventListener("click", (event) => {
        const stop = event.target.value === "stop";
        play = !stop;
        event.target.innerText = event.target.value = stop ? "play" : "stop";
      });

      document.getElementById("interval").addEventListener("input", (event) => {
        interval = event.target.value;
      });

      document.getElementById("randoms").addEventListener("input", (event) => {
        randoms = event.target.value;
      });

      function getSettings() {
        const interval = Number(intervalInput.value);
        const randomCount = Number(randomsInput.value);

        return { interval, randomCount };
      }

      function setup() {
        const c = createCanvas(COLS * CELL, ROWS * CELL);
        c.parent("canvasWrap");
        addRandomAlives();
        noStroke();
      }

      function addRandomAlives() {
        for (let i = 0; i < randomAlives; i++) {
          const x = Math.floor(Math.random() * ROWS);
          const y = Math.floor(Math.random() * COLS);
          board[y][x] = 1;
        }
        tempBoard = structuredClone(board);
      }

      function simulate() {
        background(15);
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            checkNeighbours(y, x);
            drawCell(y, x, tempBoard[y][x]);
          }
        }
        board = structuredClone(tempBoard);
      }

      function hasNeighbour(y, x) {
        if (y < 0 || y >= COLS || y > ROWS || x < 0 || x > COLS || x >= ROWS) {
          return 0;
        }

        return board[y][x];
      }

      let sum = 0;

      function checkNeighbours(y, x) {
        sum = 0;
        let alive = board[y][x] === 1;

        sum = sum + hasNeighbour(y - 1, x - 1);
        sum = sum + hasNeighbour(y - 1, x);
        sum = sum + hasNeighbour(y - 1, x + 1);

        sum = sum + hasNeighbour(y, x - 1);
        sum = sum + hasNeighbour(y, x + 1);

        sum = sum + hasNeighbour(y + 1, x - 1);
        sum = sum + hasNeighbour(y + 1, x);
        sum = sum + hasNeighbour(y + 1, x + 1);

        if ((alive && sum < 2) || (alive && sum > 3)) {
          tempBoard[y][x] = 0;
        }

        if (!alive && sum === 3) {
          tempBoard[y][x] = 1;
        }
      }

      function draw() {
        if (simulationOver) {
          fill(0, 0, 0, 160);
          rect(0, 0, width, height);
          textSize(20);
          text("Press R to restart", width / 2, height / 2 + 18);
          return;
        }
        if (!play) return;

        tick(deltaTime);
      }

      function tick(dt) {
        deltaSum += dt;
        if (deltaSum >= interval) {
          simulate();
          deltaSum = 0;
        }
      }

      function drawCell(x, y, colorNumber) {
        if (colorNumber === 0) fill(255, 240, 255);
        if (colorNumber === 1) fill(0, 0, 40);

        rect(x * CELL, y * CELL, CELL - 1, CELL - 1);
      }
    </script>
  </body>
</html>
